name: Robot ENISE STAGES

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Recuperation du code
        uses: actions/checkout@v4

      - name: 2. Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Installation des outils
        run: |
          pip install python-jobspy pandas firebase-admin

      - name: 4. Execution du scraper vers Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scraper.py
