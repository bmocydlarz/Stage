name: Script de Scraping vers Firebase

on:
  schedule:
    # S'exécute tous les jours à 3h00 du matin (UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Permet de lancer le bouton "Run workflow" manuellement pour tester

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Recuperation du code
        uses: actions/checkout@v4

      - name: 2. Installation de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. Installation des outils
        run: |
          pip install python-jobspy pandas firebase-admin

      - name: 4. Execution du scraper vers Firebase
        # On passe le secret Firebase au script Python
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scraper.py
