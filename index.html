<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENISE STAGES</title>
    <style>
        :root { --enise-red: #e2001a; --sport-yellow: #ffcc00; }
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding-bottom: 20px; }
        
        /* Style ENISE BET original */
        header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--enise-red); }
        h1 { color: #333; margin: 0; font-size: 1.5rem; font-weight: bold; }
        h1 span { color: var(--enise-red); }

        .auth-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 80%; max-width: 350px; text-align: center; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-main { background: var(--enise-red); color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* Liste des stages type "Prochains DS" */
        .stage-item { background: white; margin: 10px; padding: 15px; border-radius: 8px; border-left: 5px solid var(--enise-red); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .job-title { font-weight: bold; font-size: 1.1rem; color: #222; }
        .company { color: var(--enise-red); font-weight: bold; margin: 5px 0; }
        .details { font-size: 0.85rem; color: #666; }
        .btn-link { display: inline-block; margin-top: 10px; color: var(--enise-red); text-decoration: none; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="login-card">
            <h1>ENISE<span>STAGES</span></h1>
            <p style="color:#888; font-size:0.8rem;">Accès réservé @enise.fr</p>
            <input type="email" id="email" placeholder="prenom.nom@enise.fr">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn-main" id="btn-login">Se connecter / S'inscrire</button>
        </div>
    </div>

    <div id="app" style="display:none;">
        <header>
            <h1>ENISE<span>STAGES</span></h1>
            <div id="user-pill" style="background:#eee; padding:5px 10px; border-radius:20px; font-size:0.7rem; font-weight:bold;"></div>
        </header>

        <h2 style="margin: 20px 15px 10px;">💼 Mes Offres</h2>
        <div id="list-container"></div>
        
        <p onclick="logout()" style="text-align:center; color:#aaa; font-size:0.8rem; margin-top:30px; cursor:pointer;">Déconnexion</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkOE-XWdAlgT2ihoPkBUtR2lmvE78JfMA",
            authDomain: "enisebet.firebaseapp.com",
            projectId: "enisebet",
            storageBucket: "enisebet.firebasestorage.app",
            messagingSenderId: "389153667220",
            appId: "1:389153667220:web:0c3530e05911c0da1e5c81"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('btn-login').onclick = async () => {
            const email = document.getElementById('email').value.toLowerCase().trim();
            const pass = document.getElementById('pass').value;
            if (!email.endsWith("@enise.fr")) return alert("Mail ENISE requis !");
            
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                try {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    alert("Compte créé !");
                } catch (err) { alert(err.message); }
            }
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('user-pill').innerText = user.email.split('@')[0];
                loadStages(user.email);
            }
        });

        async function loadStages(email) {
            const container = document.getElementById('list-container');
            container.innerHTML = "<p style='text-align:center;'>Recherche...</p>";
            
            // On récupère uniquement le document qui a ton nom d'email
            const docSnap = await getDoc(doc(db, "jobs", email));
            if (docSnap.exists()) {
                const offers = docSnap.data().offers || [];
                container.innerHTML = offers.map(j => `
                    <div class="stage-item">
                        <div class="job-title">${j.title}</div>
                        <div class="company">${j.company}</div>
                        <div class="details">📍 ${j.location} • ${j.site}</div>
                        <a href="${j.job_url}" target="_blank" class="btn-link">VOIR L'OFFRE →</a>
                    </div>
                `).join('');
            } else {
                container.innerHTML = "<p style='text-align:center; color:#999; margin-top:30px;'>Aucun stage encore trouvé.<br>Le robot passera cette nuit !</p>";
            }
        }
    </script>
</body>
</html>
