<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENISE STAGES</title>
    <link rel="stylesheet" href="style.css"> <style>
        :root { --enise-red: #e2001a; --bg-gray: #f4f4f4; }
        body { font-family: sans-serif; background: var(--bg-gray); margin: 0; padding-bottom: 80px; }
        header { background: white; padding: 15px; text-align: center; border-bottom: 2px solid var(--enise-red); }
        h1 { color: var(--enise-red); margin: 0; font-size: 1.5rem; }
        .stage-card { background: white; margin: 15px; padding: 15px; border-radius: 12px; border-left: 5px solid var(--enise-red); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .company { color: #555; font-weight: bold; margin: 5px 0; }
        .location { font-size: 0.85rem; color: #888; }
        .btn-apply { display: block; background: var(--enise-red); color: white; text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; margin-top: 10px; font-weight: bold; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color:var(--enise-red)">ENISE<span>STAGES</span></h2>
        <p>Connecte-toi avec ton mail ENISE</p>
        <input type="email" id="email" placeholder="prenom.nom@enise.fr" style="padding:10px; margin:5px; width:80%">
        <input type="password" id="pass" placeholder="Mot de passe" style="padding:10px; margin:5px; width:80%">
        <button id="btn-login" style="background:var(--enise-red); color:white; border:none; padding:12px 30px; border-radius:5px; margin-top:10px">Se connecter</button>
    </div>

    <div id="app" style="display:none;">
        <header><h1>ENISE<span>STAGES</span></h1><p id="user-welcome" style="font-size:0.8rem; margin:5px 0 0 0;"></p></header>
        <main id="list-container"></main>
        <button onclick="logout()" style="display:block; margin: 20px auto; border:none; background:none; color:grey;">Déconnexion</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkOE-XWdAlgT2ihoPkBUtR2lmvE78JfMA",
            authDomain: "enisebet.firebaseapp.com",
            projectId: "enisebet",
            storageBucket: "enisebet.firebasestorage.app",
            messagingSenderId: "389153667220",
            appId: "1:389153667220:web:0c3530e05911c0da1e5c81"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('btn-login').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Erreur : " + err.message));
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user && user.emailVerified) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('user-welcome').innerText = "Session : " + user.email;
                loadStages(user.email);
            }
        });

        async function loadStages(email) {
            const docSnap = await getDoc(doc(db, "jobs", email.toLowerCase().trim()));
            const container = document.getElementById('list-container');
            if (docSnap.exists()) {
                const offers = docSnap.data().offers || [];
                container.innerHTML = offers.map(j => `
                    <div class="stage-card">
                        <div style="font-weight:bold; font-size:1.1rem;">${j.title}</div>
                        <div class="company">${j.company}</div>
                        <div class="location">📍 ${j.location} | via ${j.site}</div>
                        <a href="${j.job_url}" target="_blank" class="btn-apply">Voir l'offre</a>
                    </div>
                `).join('');
            } else {
                container.innerHTML = "<p style='text-align:center; margin-top:50px; color:#888;'>Aucun stage trouvé. Ton robot tourne cette nuit !</p>";
            }
        }
    </script>
</body>
</html>
